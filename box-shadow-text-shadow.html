<!DOCTYPE HTML>
<html>
	<head>
		<title>
			box shadow and text shadow
		</title>
		<style>
			p{
				text-shadow: 5px 5px 5px red, 5px 5px 5px blue, 5px 5px 5px yellow;
				font-size:30px;
				color:white;
				
			}
			div{
				height:300px;
				width:300px;
				box-shadow:-2px -2px 10px red, -2px -2px 10px blue;
			}
		</style>
	</head>
	<body>
		<p>
			hello welcome to css
		</p>
		<div>
		</div>
	</body>
</html>
