<!DOCTYPE HTML>
<html>
	<head>
		<title>
			simple selectors
		</title>
		<style>
			/* element selector */
			p{
				background-color:blue;
				color:white;
			}
			/* universal selector */
			*{
				margin:0;
				padding:0;
				color:red;
			}
			/* class selector */
			.myclass{
				font-size:25px;
			}
			/* id selector */
			#myid{
				border:3px solid red;
			}
			/* group selector */
			i, em{
				color:brown;
			}
		</style>
	</head>
	<body>
		<p class="myclass" id="myid">
			hello welcome to css
		</p>
		<section>
			section
		</section>
		<i>
			italic
		</i>
		<em>
			emphesized text
		</em>
	</body>
</html>
