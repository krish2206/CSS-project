<!DOCTYPE HTML>
<HTML>
	<HEAD>
		<style>
			.block1{
				margin-left:25%;
				margin-top:5%;
				height:600px;
				width:25%;
				border:1px solid black;
				float:left;
				border-radius:5px;
			}
			
			.block2{
				margin-left:1%;
				margin-top:5%;
				height:600px;
				width:25%;
				border:1px solid black;
				float:left;
				border-radius:5px;
			}
			
			.align_center{
				text-align:center;
			}
			
			.form1{
				margin:10%;
			}
			
			.radius, input{
					border-radius:5px;
					width:100%;
					height:30px;
					padding-left:0;
					margin-top:20px;
			}
			
			
			
			.facebook, login{
				margin-top:5px;
				width:100%;
				height:30px;
				background-color:blue;
				color:White;
				border-radius:5px;
			}
			
			.google{
				margin-top:5px;
				width:100%;
				height:30px;
				border-radius:5px;
				background-color:white;
			}
		</style>
	</HEAD>
	
	<BODY>
		<Div>
			<section class="block1">
				<div >
					<h1 class="align_center">Login </h1>
					<h2 class="align_center">Welcome Back!</h2>
					
					<form method="post" class="form1">
						<Label>
					
						</Label>
						<br>
						<input class="radius input" type="text" name="name" placeholder="Enter Username">
						<br>
						
						
						<input class="radius input" type="Password" name="Password" placeholder="Enter Your Password">
						
						
						<p class="align_center"><a href="">Forgot Password?</a></p>
						<button class="facebook"> Login </button>
						<p class="align_center">Don't have account.<a href=""> Sign up?</a></p>

						<hr style="margin-top:30px;">
						
						<button class="facebook"> Login with Facebook </button>
						<button class="google align_center"> Login with Google </button>
					
					</form>
				</div>
			</section>
			
			
			
			<section STYLE="float:left;" class="block2" >
				<div >
					<h1 class="align_center">Sign Up </h1>
					<h2 class="align_center"></h2>
					
					<form method="post" class="form1">
						<Label>
					
						</Label>
						<br>
						<input class="radius input" type="text" name="name" placeholder="Enter Username">
						<br>
						<input class="radius input" type="email" name="email" placeholder="Enter Email Id">
						<input class="radius input" type="number" name="number" placeholder="Enter Your Phone no">
						
						
						<input class="radius input" type="Password" name="Password" placeholder="Enter Your Password">
						
						
						
						<button class="facebook"> Sign up </button>
						<p class="align_center">Already have an account.<a href=""> login </a></p>

						<hr style="margin-top:30px;">
						
						<button class="facebook"> Login with Facebook </button>
						<button class="google align_center"> Login with Google </button>
					
					</form>
				</div>
			</section>
		</DIV>
	</BODY>


</HTML>
